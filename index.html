<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="content">
      <img src="img/cw_logo_horizontal.png" alt="" style="height: 5vh; display: block; margin: 0 auto;">
      <div class="level-label">
        <p id="level">Level: 2</p>
      </div>
      <p style="font-size: 1rem; font-weight: bold;">Recipe:<span id="recipe"></span></p>
      <i style="font-size: 0.7rem;">Hint: click boxes to construct the correct type of filter for clean water!</i>
      <p id="winner-debug" style="text-align: center;"></p>
      <div style="margin: 0 auto; width: 25vw; height: 15vh; display: flex; justify-content: center; align-items: center; overflow: hidden;"><img src="img/pond.jpg" alt="" style="margin: 0 auto; width: 13vw; transform: scale(1.7,1);"></div>
      <div class="vertical-list-container">
        <div class="vertical-list">
          <div id="item-1" class="vertical-list-item"><div class="item-icon"></div><p class="item-name" id="item-name-1">none</p></div>
          <div class="water-arrow"><p>↓</p></div>
          <div id="item-2" class="vertical-list-item"><div class="item-icon"></div><p class="item-name" id="item-name-2">none</p></div>
          <div class="water-arrow"><p>↓</p></div>
          <div id="item-3" class="vertical-list-item"><div class="item-icon"></div><p class="item-name" id="item-name-3">none</p></div>
        </div>
      </div>
      <div id="faucet"></div>


    </div>
    <script src="script.js"></script>
</body>
</html>
