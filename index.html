<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar"><a href="https://www.charitywater.org/"><img src="img/cw_logo_horizontal.png" alt="" style="" class="top-logo"></a></div>
    <div class="content">
      
      <div class="level-label">
        <p id="level">Level: 1</p>
      </div>
      <div class="recipe-container" style=""><p style="font-size: 1.5rem; ">Recipe: <span id="recipe"></span></p></div>
      <i style="font-size: 0.7rem; color: #aaa;">Hint: Follow <u>the recipe</u>, click <u>boxes</u>, and make the right filter for clean water!</i>
      <!-- <p id="winner-debug" style="text-align: center;"></p> -->
      <div class="vertical-list-container">
        <div style="margin: 10px auto; width: 25vw; height: 8vh; display: flex; justify-content: center; align-items: center; overflow: hidden;"><img src="img/pond-3.jpg" alt="" style="margin: 0 auto; width: 14vw; transform: scale(1.1,1);"></div>
        <div class="vertical-list"></div>
        <div id="faucet"></div>
      </div>


    </div>
    <div class="footer">
      <p>Made for <a href="https://www.charitywater.org/" target="_blank">Charity Water</a></p>

    </div>
    <script src="script.js"></script>
</body>
</html>
